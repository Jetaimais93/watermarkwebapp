<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水印边框大师 - Web版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/exifr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <img src="logos/SONY.png" alt="logo" class="header-logo">
                <h1>水印边框大师 Web版</h1>
            </div>
            <p>高自由度 · 支持GitHub Pages · 纯前端隐私安全</p>
        </header>

        <div class="main-content">
            <!-- 左侧控制面板 -->
            <div class="sidebar">
                <!-- 品牌水印 -->
                <div class="section">
                    <h3>📷 品牌水印</h3>
                    <div class="brand-grid" id="brandTemplates"></div>
                </div>

                <!-- 自定义水印 -->
                <div class="section">
                    <h3>✍️ 自定义水印</h3>
                    
                    <div class="watermark-group">
                        <h4>文字水印</h4>
                        <input type="text" id="customText" placeholder="输入文字" value="@你的名字">
                        
                        <div class="control-row">
                            <label>字体</label>
                            <select id="fontFamily">
                                <option value="system-ui">系统默认</option>
                                <option value="'Noto Sans SC', sans-serif">Noto Sans SC</option>
                                <option value="'Noto Serif SC', serif">Noto Serif SC</option>
                                <option value="'Roboto', sans-serif">Roboto</option>
                                <option value="'Playfair Display', serif">Playfair Display</option>
                            </select>
                        </div>
                        
                        <div class="control-row">
                            <label>大小 <span id="fontSizeValue">36</span></label>
                            <input type="range" id="fontSize" min="12" max="140" value="36">
                        </div>
                        
                        <div class="control-row">
                            <label>颜色</label>
                            <input type="color" id="textColor" value="#ffffff">
                        </div>
                        
                        <div class="control-row">
                            <label>透明度 <span id="textOpacityValue">88</span>%</label>
                            <input type="range" id="textOpacity" min="10" max="100" value="88">
                        </div>
                        
                        <button id="addTextWatermarkBtn" class="btn primary">添加文字水印</button>
                    </div>

                    <div class="watermark-group">
                        <h4>图片水印</h4>
                        <button id="uploadImageWatermarkBtn" class="btn">上传图片水印</button>
                        <input type="file" id="imageWatermarkInput" accept="image/*" hidden>
                        
                        <div id="imageWatermarkPreview" style="display:none; margin-top:10px;">
                            <img id="imageWatermarkThumb" style="max-width:100%; max-height:80px; border-radius:6px; border:1px solid #334155;">
                            <button id="removeImageWatermarkBtn" class="btn danger" style="width:100%; margin-top:6px;">移除</button>
                        </div>
                    </div>
                </div>

                <!-- 边框 -->
                <div class="section">
                    <h3>🖼️ 边框</h3>
                    <div class="control-row">
                        <label>样式</label>
                        <select id="borderStyle">
                            <option value="none">无边框</option>
                            <option value="rect">长方形</option>
                            <option value="square">正方形</option>
                            <option value="rounded">圆角矩形</option>
                            <option value="circle">圆形</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label>宽度 <span id="borderWidthValue">10</span>px</label>
                        <input type="range" id="borderWidth" min="0" max="100" value="10">
                    </div>
                    <div class="control-row">
                        <label>圆角 <span id="borderRadiusValue">0</span>px</label>
                        <input type="range" id="borderRadius" min="0" max="120" value="0">
                    </div>
                    <div class="control-row">
                        <label>颜色</label>
                        <input type="color" id="borderColor" value="#000000">
                    </div>
                    <button id="applyBorderBtn" class="btn">应用到所有图片</button>
                </div>

                <div class="section">
                    <h3>💾 我的模板</h3>
                    <div id="myTemplates"></div>
                    <button id="saveTemplateBtn" class="btn">保存当前配置</button>
                </div>
            </div>

            <!-- 中间：照片列表 -->
            <div class="workspace">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <p>📁 拖拽或点击上传照片</p>
                        <button id="uploadBtn" class="btn primary">选择照片</button>
                        <input type="file" id="fileInput" multiple accept="image/*" hidden>
                        <p class="hint">支持批量 · 最多 50 张</p>
                    </div>
                </div>

                <div class="images-grid" id="imagesGrid" style="display:none;">
                    <div class="grid-header">
                        <span id="imageCount">0 张照片</span>
                        <div class="actions">
                            <button id="processAllBtn" class="btn primary">批量渲染</button>
                            <button id="downloadAllBtn" class="btn" disabled>下载 ZIP</button>
                            <button id="clearAllBtn" class="btn danger">清空</button>
                        </div>
                    </div>
                    <div class="grid" id="gridContainer"></div>
                </div>
            </div>

            <!-- 右侧：实时预览 -->
            <div class="preview-panel">
                <div class="preview-header">
                    <h3>实时预览</h3>
                    <div class="preview-actions">
                        <button id="openFineTuneBtn" class="btn">精细调整</button>
                        <button id="downloadCurrentBtn" class="btn primary">下载高清 PNG</button>
                    </div>
                </div>
                
                <div class="live-preview-wrapper">
                    <canvas id="livePreviewCanvas" width="800" height="600"></canvas>
                </div>
                
                <div class="live-controls">
                    <div class="control-row">
                        <label>画幅</label>
                        <select id="aspectRatio">
                            <option value="original">原始比例</option>
                            <option value="16:9">16:9</option>
                            <option value="4:3">4:3</option>
                            <option value="3:2">3:2</option>
                            <option value="1:1">1:1 正方形</option>
                            <option value="9:16">9:16 竖版</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label>透明度 <span id="liveOpacityValue">88</span>%</label>
                        <input type="range" id="liveOpacity" min="10" max="100" value="88">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 精细调整模态框 -->
    <div id="previewModal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3>精细调整</h3>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            
            <div class="preview-wrapper">
                <canvas id="previewCanvas" width="1100" height="750"></canvas>
            </div>

            <div class="preview-controls">
                <div class="control-group">
                    <label>全局透明度 <span id="globalOpacityValue">88</span>%</label>
                    <input type="range" id="globalOpacity" min="10" max="100" value="88">
                </div>
                <div class="control-group">
                    <label>旋转 <span id="rotationValue">0</span>°</label>
                    <input type="range" id="rotation" min="-45" max="45" step="5" value="0">
                </div>
            </div>

            <div class="modal-actions">
                <button id="applyToCurrentBtn" class="btn primary">应用到当前</button>
                <button id="applyToAllBtn" class="btn">应用到全部</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
