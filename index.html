<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水印边框大师 - Web版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- CDN libraries -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/exifr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <h1>🖼️ 水印边框大师 Web版</h1>
            <p>纯前端实现 · 支持GitHub Pages部署 · 类似原生App体验</p>
        </header>

        <div class="main-content">
            <!-- Sidebar: Templates -->
            <div class="sidebar">
                <h3>水印模板</h3>
                
                <div class="template-section">
                    <h4>品牌水印</h4>
                    <div class="brand-templates" id="brandTemplates">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="template-section">
                    <h4>自定义水印</h4>
                    <div class="custom-controls">
                        <input type="text" id="customText" placeholder="输入水印文字（如：@你的名字）" value="@摄影师">
                        <div class="row">
                            <label>字体大小: <input type="range" id="fontSize" min="10" max="80" value="24"></label>
                            <span id="fontSizeValue">24</span>
                        </div>
                        <div class="row">
                            <label>透明度: <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.85"></label>
                            <span id="opacityValue">85%</span>
                        </div>
                        <div class="row">
                            <label>颜色: <input type="color" id="textColor" value="#ffffff"></label>
                        </div>
                        <button id="addCustomBtn" class="btn primary">添加文字水印</button>
                        
                        <!-- 图片水印新增 -->
                        <div style="margin-top:12px;border-top:1px solid #334155;padding-top:12px;">
                            <button id="uploadImageWatermarkBtn" class="btn" style="width:100%;">上传图片水印</button>
                            <input type="file" id="imageWatermarkInput" accept="image/*" hidden>
                            <div id="imageWatermarkPreview" style="margin-top:8px;display:none;">
                                <img id="imageWatermarkThumb" style="max-width:100%;max-height:60px;border-radius:6px;border:1px solid #334155;">
                                <button id="removeImageWatermarkBtn" class="btn danger" style="margin-top:6px;width:100%;font-size:0.8rem;">移除图片水印</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="template-section">
                    <h4>边框</h4>
                    <div class="border-controls">
                        <label>边框宽度: <input type="range" id="borderWidth" min="0" max="50" value="0"></label>
                        <span id="borderWidthValue">0px</span>
                        <label>边框颜色: <input type="color" id="borderColor" value="#000000"></label>
                        <button id="applyBorderBtn" class="btn">应用边框</button>
                    </div>
                </div>

                <div class="template-section">
                    <h4>我的模板</h4>
                    <div id="myTemplates"></div>
                    <button id="saveTemplateBtn" class="btn">保存当前模板</button>
                </div>
            </div>

            <!-- Main Area -->
            <div class="workspace">
                <!-- Upload Area -->
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <p>📁 拖拽图片到此处 或</p>
                        <button id="uploadBtn" class="btn primary">选择图片</button>
                        <input type="file" id="fileInput" multiple accept="image/*" hidden>
                        <p class="hint">支持批量上传 · 最多50张</p>
                    </div>
                </div>

                <!-- Images Grid -->
                <div class="images-grid" id="imagesGrid" style="display: none;">
                    <div class="grid-header">
                        <span id="imageCount">已加载 0 张图片</span>
                        <div>
                            <button id="processAllBtn" class="btn primary">批量添加水印</button>
                            <button id="downloadAllBtn" class="btn" disabled>下载ZIP</button>
                            <button id="clearAllBtn" class="btn danger">清空</button>
                        </div>
                    </div>
                    <div class="grid" id="gridContainer"></div>
                </div>

                <!-- Preview Modal -->
                <div id="previewModal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>水印预览与调整</h3>
                            <button class="close-btn" id="closeModal">&times;</button>
                        </div>
                        <div class="preview-container">
                            <canvas id="previewCanvas" width="600" height="400"></canvas>
                        </div>
                        <div class="adjustment-controls">
                            <div class="control-group">
                                <label>位置 X: <input type="range" id="posX" min="0" max="100" value="50"></label>
                                <span id="posXValue">50%</span>
                            </div>
                            <div class="control-group">
                                <label>位置 Y: <input type="range" id="posY" min="0" max="100" value="90"></label>
                                <span id="posYValue">90%</span>
                            </div>
                            <div class="control-group">
                                <label>大小: <input type="range" id="scale" min="0.3" max="3" step="0.1" value="1"></label>
                                <span id="scaleValue">1.0x</span>
                            </div>
                            <div class="control-group">
                                <label>旋转: <input type="range" id="rotation" min="-45" max="45" step="5" value="0"></label>
                                <span id="rotationValue">0°</span>
                            </div>
                            <div class="control-group">
                                <label>透明度: <input type="range" id="previewOpacity" min="0.1" max="1" step="0.05" value="0.85"></label>
                                <span id="previewOpacityValue">85%</span>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button id="applyToCurrentBtn" class="btn primary">应用到当前图片</button>
                            <button id="applyToAllBtn" class="btn">应用到所有图片</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
